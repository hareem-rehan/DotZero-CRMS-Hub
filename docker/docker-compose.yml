version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dotzero_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dotzero
      POSTGRES_PASSWORD: dotzero
      POSTGRES_DB: dotzero_crms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dotzero -d dotzero_crms']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

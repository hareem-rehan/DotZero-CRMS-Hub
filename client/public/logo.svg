<svg width="320" height="76" viewBox="0 0 320 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Red rounded square icon -->
  <rect width="76" height="76" rx="14" fill="#EF323F"/>
  <!-- Dot (small white square bottom-left) -->
  <rect x="12" y="51" width="13" height="13" rx="2" fill="white"/>
  <!-- Zero letterform: outer white rect -->
  <rect x="29" y="10" width="37" height="54" rx="8" fill="white"/>
  <!-- Zero letterform: inner red cutout -->
  <rect x="39" y="21" width="17" height="32" rx="4" fill="#EF323F"/>

  <!-- DotZero wordmark -->
  <text x="96" y="57" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="52" fill="#2D2D2D" letter-spacing="-1">DotZero</text>
</svg>
